# Command Center — control plane (consolidated). Reach over Tailscale.
# LiteLLM is pinned by DIGEST (not tag) — see Makefile LITELLM_DIGEST and the
# README security note re: the March 2026 PyPI compromise. `make verify` checks it.

services:

  hermes:
    # Optional: the previously suggested nousresearch/hermes-agent image is not
    # published on Docker Hub. Keep this service out of the default stack until
    # a real Hermes runtime image or local `ollama launch hermes` bridge is set.
    profiles: ["hermes"]
    image: nousresearch/hermes-agent:v0.15.1
    restart: unless-stopped
    environment:
      # Hermes speaks OpenAI-compatible API env names here. The value is the
      # LiteLLM virtual key, not an OpenAI provider key.
      - OPENAI_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=${HERMES_LITELLM_KEY}
      - HERMES_DEFAULT_MODEL=planner
      - DELEGATION_MAX_CONCURRENT_CHILDREN=3
      - LEDGER_BASE_URL=http://ledger:8090
    volumes:
      - hermes_data:/opt/data
    ports: ["127.0.0.1:9119:9119"]
    depends_on:
      litellm: { condition: service_healthy }
      ledger:  { condition: service_started }
    networks: [core]

  # One-shot: render generated/litellm-config.yaml from configs/ INSIDE Docker so
  # `docker compose up -d` works without a prior `make render` (the make-free path).
  # Exits 0 when done; litellm waits for that via depends_on.
  config-render:
    build:
      context: .
      dockerfile: docker/render.Dockerfile
    restart: "no"
    volumes:
      - ./configs:/work/configs:ro
      - ./generated:/work/generated
    networks: [core]

  litellm:
    # PINNED BY DIGEST. Replace the placeholder with a verified GHCR digest.
    image: ghcr.io/berriai/litellm@sha256:7c311546c25e7bb6e8cafede9fcd3d0d622ac636b5c9418befaa32e85dfb0186
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=postgresql://litellm:${POSTGRES_PASSWORD}@litellm-db:5432/litellm
      - STORE_MODEL_IN_DB=True
      # Local-only model tier. Point to host.docker.internal for local Windows
      # Ollama, or to the 4090's Tailscale IP from the VPS. There is no cloud
      # fallback; if Ollama is unavailable, model calls fail closed.
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://host.docker.internal:11434}
    volumes:
      - ./generated/litellm-config.yaml:/app/config.yaml:ro
    ports: ["127.0.0.1:4000:4000"]
    depends_on:
      litellm-db: { condition: service_healthy }
      config-render: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [core]

  litellm-db:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=litellm
    volumes:
      - litellm_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [core]

  ledger:
    build: ./services/ledger
    restart: unless-stopped
    environment:
      - LEDGER_DB=/data/ledger.db
      - LEDGER_APPROVAL_SECRET=${LEDGER_APPROVAL_SECRET}
    volumes:
      - ledger_data:/data
    ports: ["127.0.0.1:${LEDGER_HOST_PORT:-8091}:8090"]
    networks: [core]

  # Judge Gate + judge array (judgectl) — one container, one thing to deploy.
  judge-gate:
    build: ./services/judge_gate
    restart: unless-stopped
    environment:
      - LITELLM_BASE_URL=http://litellm:4000/v1
      - JUDGE_GATE_KEY=${JUDGE_GATE_LITELLM_KEY}
      - TRIAGE_MODEL=triage
      - SKEPTIC_MODEL=security-judge
      - LEDGER_BASE_URL=http://ledger:8090
      - STANDARDS_CONFIG=/app/standards.yaml
      - GATES_CONFIG=/app/gates.yaml
      - MODELS_CONFIG=/app/models.yaml
    volumes:
      - ./configs/standards.yaml:/app/standards.yaml:ro
      - ./configs/gates.yaml:/app/gates.yaml:ro
      - ./configs/models.yaml:/app/models.yaml:ro
    ports: ["127.0.0.1:8088:8088"]
    depends_on:
      litellm: { condition: service_healthy }
    networks: [core]

  uptime-kuma:
    image: louislam/uptime-kuma:1.23.16
    restart: unless-stopped
    volumes:
      - kuma_data:/app/data
    ports: ["127.0.0.1:3001:3001"]
    networks: [core]

  # Proactive runner — scheduled checks on already-done work (DAG/data health +
  # repo stewardship). Shares the Ledger + Judge Gate. Holds NO secrets and has
  # no write path of its own; the most it does autonomously is open a gated
  # mission. proactive.yaml is mounted read-only. Invoke on a schedule via host
  # cron / systemd timer: `docker compose run --rm proactive-runner`.
  proactive-runner:
    build: ./services/proactive_runner
    restart: "no"
    environment:
      - LEDGER_BASE_URL=http://ledger:8090
      - JUDGE_GATE_BASE_URL=http://judge-gate:8088
      - PROACTIVE_CONFIG=/app/proactive.yaml
    volumes:
      - ./configs/proactive.yaml:/app/proactive.yaml:ro
    depends_on:
      ledger: { condition: service_started }
      judge-gate: { condition: service_started }
    networks: [core]

  # First-party agent kanban + observability UI (configs/ui.yaml: agent_kanban_ui).
  # OPTIONAL Phase-4 convenience layer — `--profile ui` to start it. This profile
  # is the full local console: it reads Ledger and first-party internal boards, exposes
  # GatewayCore chat, and writes only through governed verbs plus validated
  # profile/domain config editors. Loopback-bound; reach over Tailscale; put a
  # password in front before exposing beyond loopback.
  agent-kanban-ui:
    profiles: ["ui"]
    build:
      context: .
      dockerfile: services/agent_kanban_ui/Dockerfile
    restart: unless-stopped
    # Grand reconciliation can take tens of seconds on Docker Desktop bind
    # mounts. Let Uvicorn finish and release cross-OS O_EXCL lock files before
    # Compose replaces the container; foreign stale locks otherwise fail closed.
    stop_grace_period: 90s
    environment:
      - LEDGER_BASE_URL=http://ledger:8090
      - GROWTHOS_AGENT_LOG=/logs/agent_calls.jsonl
      - KANBAN_BOARD_SNAPSHOT=/snapshot/board-snapshot.json
      - KANBAN_UI_CONFIGS=/app/configs
      # typed domain surfaces: the internal board card store + event log, read
      # from the same ./generated mount as the board snapshot. In full-console
      # mode, governed card moves write events into this mount.
      - KANBAN_EVENT_LOG=/snapshot/kanban-events.jsonl
      - KANBAN_BOARD_STORE=/snapshot/boards
      - BETTS_GRAND_TODO_SOURCE=/workspace/betts_basketball/docs/backend/projects/GRAND_TODO_LIST.md
      - MASTER_GRAND_TODO_SOURCE=/app/docs/todos/GRAND_TODO_LIST.md
      - LEDGER_UI_URL=${LEDGER_UI_URL:-}
      # Chat + governed writes turn the UI into a channel. 1 here = full console;
      # remove it for a read-only
      # board deployment. L3/L4 approve/kill never reach here.
      - KANBAN_UI_CHAT_ENABLED=1
      # Full-console only: allow Controls -> All Boards to edit
      # configs/domain_surfaces.yaml after schema validation.
      - KANBAN_UI_DOMAIN_CONFIG_WRITES=1
      # Canonical captures/work placements must survive cockpit restarts. The
      # full console refuses work writes when the Work Graph is not durable.
      - KANBAN_UI_CAPTURE_LEDGER=1
      - KANBAN_UI_WORKGRAPH_LEDGER=1
      # Chat flight recorder: full-fidelity per-turn transcripts (tool args,
      # results, injected context, final answer) under the ./generated mount —
      # host-persisted, gitignored, never leaves the machine. Set
      # GATEWAY_TRANSCRIPTS=0 to keep thread metadata only.
      - GATEWAY_TRANSCRIPT_DIR=/snapshot/chat-transcripts
      - GATEWAY_TRANSCRIPTS=${GATEWAY_TRANSCRIPTS:-1}
      - LITELLM_BASE_URL=http://litellm:4000/v1
      # Ollama lives on the HOST; the chat
      # tool layer's network_health probe reads this instead of localhost.
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://host.docker.internal:11434}
      # Packet writer timeout: qwen3:30b generations take 20-90s alone but
      # 4-5 min when other GPU stacks (betts_basketball Airflow) contend for
      # VRAM — the 300s default dies at that margin (observed 2026-07-09).
      - JOB_SEARCH_WRITER_TIMEOUT=${JOB_SEARCH_WRITER_TIMEOUT:-600}
      # Growth OS actions use the same governed board store and event log as the UI.
      - GROWTHOS_BOARD_STORE=/snapshot/boards
      - GROWTHOS_KANBAN_EVENT_LOG=/snapshot/kanban-events.jsonl
      - GROWTHOS_WATCHER_STATUS=/app/watcher-state/watcher_status.json
      - GROWTHOS_RESEARCH_REFRESH=/app/watcher-state/research_refresh.json
      # Agent Sessions (Claude Agent / Codex Agent, structurally separate from
      # GatewayCore chat above — see WORKLOG.md "Agent-session chat
      # integration"). The worker runs on the HOST (own SDK/CLI auth, same
      # host.docker.internal pattern as Ollama), never in this
      # container. The local template enables real read-only sessions; Fake
      # Agent stays off unless explicitly enabled for dev use.
      - KANBAN_UI_AGENT_SESSIONS_ENABLED=${KANBAN_UI_AGENT_SESSIONS_ENABLED:-1}
      - KANBAN_UI_FAKE_AGENT_ENABLED=${KANBAN_UI_FAKE_AGENT_ENABLED:-0}
      - AGENT_WORKER_URL=${AGENT_WORKER_URL:-http://host.docker.internal:8791}
      - AGENT_WORKER_TOKEN=${AGENT_WORKER_TOKEN:-}
      # Honest provider limits/availability and internal budgets. Provider
      # reset timestamps remain unknown unless the provider reports them.
      - KANBAN_UI_USAGE_ENABLED=${KANBAN_UI_USAGE_ENABLED:-0}
      - KANBAN_UI_USAGE_CODEX=${KANBAN_UI_USAGE_CODEX:-0}
      - KANBAN_UI_USAGE_CLAUDE=${KANBAN_UI_USAGE_CLAUDE:-0}
      - KANBAN_UI_USAGE_LEDGER=${KANBAN_UI_USAGE_LEDGER:-0}
    volumes:
      # the agent-call log: read for metrics AND written by the in-app channel
      # (every surface logs its own tool calls). RW when chat is on; for a
      # read-only board deployment this can be :ro (the read-only app never writes).
      - ./growth_os/_export:/logs
      # board snapshot + internal board store. Full console mode needs RW here
      # because drag/drop emits governed kanban events into this mount. For a
      # read-only board deployment, remove KANBAN_UI_CHAT_ENABLED and change this
      # back to :ro.
      - ./generated:/snapshot
      # model lanes + judge stages for the Router view, plus the validated
      # domain-surface editor in Controls. For a read-only board deployment,
      # change this back to :ro and remove KANBAN_UI_DOMAIN_CONFIG_WRITES.
      - ./configs:/app/configs
      # Life Center Launch tab: read-only. `command_center.mcp.life_center_launch`
      # shells out to life-center-infra/lc.py for catalog facts (never imports
      # it — see that repo's README on why it stays a separate boundary); the
      # runbook route resolves a handful of `../docs/...` links too. RO always
      # — this container must never write into either tree.
      - ./life-center-infra:/app/life-center-infra:ro
      - ./docs:/app/docs:ro
      # Master GRAND TODO (docs/todos) overrides the ro docs mount with RW for
      # the same reason as the Betts mount below: governed card moves/edits
      # atomically update the canonical Markdown before refreshing the
      # projection. Everything else under /app/docs stays read-only.
      - ./docs/todos:/app/docs/todos
      # job-search application memory and profile controls. The cockpit needs
      # this mount to show generated packets/follow-ups and edit question presets.
      - ./data/job_search:/app/data/job_search
      # CHAT/CONSOLE ONLY (remove for read-only): the action layer + GatewayCore.
      # The container receives local model/provider configuration from .env; board
      # writes still go through governed verbs (approval remains structurally refused).
      - ./growth_os:/app/growth_os
      - ./.env:/app/.env:ro
      - ./growth_os/_state:/app/watcher-state
      # Canonical GRAND TODO: RW because tracked-card edits and archive moves
      # atomically update the Markdown source before refreshing the projection.
      - ${BETTS_BASKETBALL_LOCAL_PATH:-../betts_basketball}:/workspace/betts_basketball
    ports: ["127.0.0.1:${KANBAN_UI_PORT:-8787}:8787"]
    depends_on:
      ledger: { condition: service_started }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8787/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [core]

  # First-party upkeep for Papers, Repos, and DAGs. AppFlowy is historical
  # recovery input only; ongoing writes use the same governed stores as the UI.
  growthos-watcher:
    profiles: ["ui"]
    build:
      context: .
      dockerfile: growth_os/Dockerfile
    restart: unless-stopped
    # A signal requests shutdown; the current curator/Airflow cycle completes
    # and releases every lock before Docker escalates. A strict research unit
    # can take more than five minutes on the local model, so this bound must
    # cover a full configured unit rather than Docker's short default drain.
    stop_grace_period: 900s
    env_file: growth_os/.env
    environment:
      - GROWTHOS_DRY_RUN=false
      - GROWTHOS_BOARD_STORE=/snapshot/boards
      - GROWTHOS_KANBAN_EVENT_LOG=/snapshot/kanban-events.jsonl
      - GROWTHOS_STATE_DIR=/app/_state
      - GROWTHOS_WATCHER_STATUS=/app/_state/watcher_status.json
      - GROWTHOS_RESEARCH_REFRESH=/app/_state/research_refresh.json
      # Cadence preserved from the retired behavior: hourly intake, daily
      # brief/guidelines/retention after 06:00 container-local time.
      - GROWTHOS_WATCH_INTERVAL_SECONDS=3600
      - GROWTHOS_CONTROL_POLL_SECONDS=5
      - GROWTHOS_DAILY_HOUR=6
      - OLLAMA_BASE_URL=${OLLAMA_API_BASE:-http://host.docker.internal:11434}
      - LEDGER_BASE_URL=http://ledger:8090
      - KANBAN_UI_BASE_URL=http://agent-kanban-ui:8787
      - AIRFLOW_BASE_URL=http://host.docker.internal:8090
      - GROWTHOS_KANBAN_IMPORTED=/snapshot/kanban-imported.json
      - GROWTHOS_STANDARDS_PATH=/cc_configs/standards.yaml
      # Board-visible Papers/Repos intake is the curator's authoritative input.
      # The watcher fails closed if this validated contract is unavailable.
      - GROWTHOS_DOMAIN_SURFACES=/cc_configs/domain_surfaces.yaml
      - GROWTHOS_AUTONOMY_CONFIG=/cc_configs/autonomy.yaml
      # Every upkeep cycle is gated on an immutable, verified snapshot of the
      # current source watermark. These paths are an explicit allowlist.
      - KANBAN_BACKUP_ROOT=/backups/kanban
      - KANBAN_BACKUP_LEDGER_DB=/backup-sources/ledger/ledger.db
      - KANBAN_BACKUP_BOARD_CONFIG=/cc_configs/kanban_boards.yaml
      - KANBAN_BACKUP_DOMAIN_CONFIG=/cc_configs/domain_surfaces.yaml
      - KANBAN_BACKUP_AUTONOMY_CONFIG=/cc_configs/autonomy.yaml
      - KANBAN_BACKUP_CONFIG_INTENT=/cc_configs/.transactions/board-module.json
      - KANBAN_BACKUP_CONFIG_AUDIT=/cc_configs/config_audit.jsonl
      - KANBAN_BACKUP_JOB_SEARCH=/backup-sources/job_search
      - KANBAN_BACKUP_JOB_SEARCH_MEMORY=/backup-sources/job_search/job_search_memory.sqlite
      - KANBAN_BACKUP_GROWTH_EXPORT=/app/_export
      - KANBAN_BACKUP_GROWTH_MEMORY=/app/_state/memory.db
      - KANBAN_BACKUP_GRAND_TODO=/backup-sources/betts/docs/backend/projects/GRAND_TODO_LIST.md
      - KANBAN_BACKUP_CHAT_THREADS=/snapshot/chat-threads.json
      - KANBAN_BACKUP_CHAT_TRANSCRIPTS=/snapshot/chat-transcripts
      - KANBAN_BACKUP_MEMORY=/snapshot/memory
      - KANBAN_BACKUP_MAINTENANCE_EVENTS=/snapshot/kanban-maintenance-events.jsonl
      - KANBAN_BACKUP_APPFLOWY_RECOVERY=/backup-sources/appflowy-recovery
    volumes:
      - ./generated:/snapshot
      - ./growth_os/_state:/app/_state
      - ./growth_os/_export:/app/_export
      - ./configs:/cc_configs:ro
      - ${KANBAN_BACKUP_HOST_PATH:-./backups}:/backups
      - ledger_data:/backup-sources/ledger:ro
      - ./data/job_search:/backup-sources/job_search:ro
      - ${BETTS_BASKETBALL_LOCAL_PATH:-../betts_basketball}:/backup-sources/betts:ro
      - ./archive/appflowy/legacy-growth-os:/backup-sources/appflowy-recovery:ro
    depends_on:
      ledger: { condition: service_started }
    networks: [core]

  # Apache Airflow (profile: airflow) — runs dags/self_improvement_daily.py on a
  # daily schedule (or on the SCAN_REQUEST asset). Single-node `standalone`
  # (scheduler + webserver + triggerer + SQLite), which matches this control
  # plane's low-volume daily cadence; no separate metadata DB to operate.
  # OBSERVER-ONLY: the DAG holds no write/promote/merge creds — its only outputs
  # are Proposed Backlog cards + one report (tests/test_self_improvement_dag.py).
  # Not started by default; bring up with `cc dag up` (or
  # `docker compose --profile airflow up -d airflow`), then `cc dag doctor`.
  airflow:
    profiles: ["airflow"]
    build:
      context: .
      dockerfile: services/airflow/Dockerfile
    restart: unless-stopped
    command: standalone
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      # The DAG's observer-only flags (see dags/self_improvement_daily.py). It
      # drafts only Backlog cards to the first-party Self Improvement board.
      - SELF_IMPROVEMENT_APPLY=true
      - SELF_IMPROVEMENT_KANBAN=true
      - SELF_IMPROVEMENT_BOARD_ID=self_improvement
      - SELF_IMPROVEMENT_BOARD_CONFIG=/opt/airflow/repo/configs/kanban_boards.yaml
      - SELF_IMPROVEMENT_REPO_CONFIG=/opt/airflow/repo/configs/autonomy.yaml
      - SELF_IMPROVEMENT_REPO_ROOT=/opt/airflow/repo
      - BETTS_BASKETBALL_LOCAL_PATH=/backup-sources/betts
      - LEDGER_DB_PATH=/opt/airflow/ledger/ledger.db
      - PYTHONPATH=/opt/airflow/repo/src
      # Scheduled and dataset-triggered DAGs refuse to mutate until this exact
      # current watermark has an immutable verified snapshot.
      - KANBAN_BACKUP_ROOT=/backups/kanban
      - KANBAN_BACKUP_LEDGER_DB=/backup-sources/ledger/ledger.db
      - GROWTHOS_BOARD_STORE=/snapshot/boards
      - GROWTHOS_KANBAN_EVENT_LOG=/snapshot/kanban-events.jsonl
      - KANBAN_BOARD_STORE=/snapshot/boards
      - KANBAN_EVENT_LOG=/snapshot/kanban-events.jsonl
      - SELF_IMPROVEMENT_REPORT_PATH=/snapshot/self-improvement-report.md
      - KANBAN_BACKUP_BOARD_CONFIG=/opt/airflow/repo/configs/kanban_boards.yaml
      - KANBAN_BACKUP_DOMAIN_CONFIG=/opt/airflow/repo/configs/domain_surfaces.yaml
      - KANBAN_BACKUP_AUTONOMY_CONFIG=/opt/airflow/repo/configs/autonomy.yaml
      - KANBAN_BACKUP_CONFIG_INTENT=/opt/airflow/repo/configs/.transactions/board-module.json
      - KANBAN_BACKUP_CONFIG_AUDIT=/opt/airflow/repo/configs/config_audit.jsonl
      - KANBAN_BACKUP_JOB_SEARCH=/opt/airflow/ledger/job_search
      - KANBAN_BACKUP_JOB_SEARCH_MEMORY=/opt/airflow/ledger/job_search/job_search_memory.sqlite
      - GROWTHOS_STATE_DIR=/backup-sources/growth-state
      - KANBAN_BACKUP_GROWTH_MEMORY=/backup-sources/growth-state/memory.db
      - KANBAN_BACKUP_GROWTH_EXPORT=/backup-sources/growth-export
      - KANBAN_BACKUP_GRAND_TODO=/backup-sources/betts/docs/backend/projects/GRAND_TODO_LIST.md
      - KANBAN_BACKUP_CHAT_THREADS=/snapshot/chat-threads.json
      - KANBAN_BACKUP_CHAT_TRANSCRIPTS=/snapshot/chat-transcripts
      - KANBAN_BACKUP_MEMORY=/snapshot/memory
      - KANBAN_BACKUP_MAINTENANCE_EVENTS=/snapshot/kanban-maintenance-events.jsonl
      - KANBAN_BACKUP_APPFLOWY_RECOVERY=/backup-sources/appflowy-recovery
    volumes:
      - ./dags:/opt/airflow/dags:ro            # the DAG, read-only
      - ./src:/opt/airflow/repo/src:ro         # command_center package (live, no rebuild)
      - ./configs:/opt/airflow/repo/configs:ro # read-only config the scanners read
      - ./data:/opt/airflow/ledger             # ledger.db the ObserverCharter writes
      - ./generated:/snapshot                  # canonical DAG outputs + backup sources
      - ./growth_os/_state:/backup-sources/growth-state:ro
      - ./growth_os/_export:/backup-sources/growth-export:ro
      - ${BETTS_BASKETBALL_LOCAL_PATH:-../betts_basketball}:/backup-sources/betts:ro
      - ./archive/appflowy/legacy-growth-os:/backup-sources/appflowy-recovery:ro
      - ledger_data:/backup-sources/ledger:ro
      - ${KANBAN_BACKUP_HOST_PATH:-./backups}:/backups
      - airflow_data:/opt/airflow              # AIRFLOW_HOME state (db, cfg, logs)
    ports: ["127.0.0.1:8080:8080"]
    networks: [core]

  # Caddy intentionally omitted — reach everything over Tailscale. If you ever
  # need public URLs, add a caddy service + Cloudflare Access here.

networks:
  core: { driver: bridge }

volumes:
  hermes_data:        # back up: memory + skills
  litellm_db_data:
  ledger_data:        # back up: missions, leases, approvals
  kuma_data:
  airflow_data:       # Airflow metadata db + config + logs (AIRFLOW_HOME)
