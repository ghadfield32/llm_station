# Life Center overview — READ-ONLY health projection. No agent verbs are granted;
# cards are produced by a scheduled status sync (see life-center-status MCP and
# docs/operations/HARDWARE_AND_LIFE_CENTER_PLAN.md). execution_scope: life ⇒ no repo.
- board_id: life_center_overview
  provider: command_center_ui
  workspace_ref: self
  board_ref: life_center_overview
  execution_scope: life
  repo_ids: []
  status_mapping:
    backlog: Monitored
    ready: Healthy
    in_progress: Healthy
    done: Healthy
    blocked: Attention
    rejected: Retired
    awaiting_approval: Attention
  required_fields:
  - service
  - status
  - last_check
  allowed_agent_verbs: []
  forbidden_agent_verbs:
  - approve_card
  - merge
  - deploy
  - delete_card
  - delete_board
  blockers: []
# Life Center services — ADMISSION lifecycle, not current health (that's
# life_center_overview). A card's lane is the admission decision (Backlog ->
# Ready -> Human approval required -> In Progress -> Done/Rejected), joined to
# life-center-infra/catalog.py by service_id + catalog_digest. Stable facts
# (docs/runbook/recovery contract) live in the catalog, not on the card — only
# lifecycle + human notes are card-owned. No automated sync exists yet
# (life_center_overview's own scheduled producer is a stub too); seed/update
# manually until a real catalog-sync job exists.
- board_id: life_center_services
  provider: command_center_ui
  workspace_ref: self
  board_ref: life_center_services
  execution_scope: life
  repo_ids: []
  status_mapping:
    backlog: Backlog
    ready: Ready
    awaiting_approval: Human approval required
    in_progress: In Progress
    blocked: Blocked
    done: Done
    rejected: Rejected
  required_fields:
  - service_id
  - catalog_digest
  - admission_status
  allowed_agent_verbs: []
  forbidden_agent_verbs:
  - approve_card
  - merge
  - deploy
  - delete_card
  - delete_board
  blockers:
  - no automated catalog-sync job yet; seed/update cards manually against
    life-center-infra/catalog.py until one exists
# Life Center operations — actionable work only (setup, incidents, backups,
# restore drills, upgrades, rollbacks), never a duplicate of Services or
# Overview. Every card joins the catalog by service_id. No action broker
# exists yet — admitted_action_ids stays empty everywhere in the catalog, so
# this board tracks proposals/evidence, not executed mutations.
- board_id: life_center_operations
  provider: command_center_ui
  workspace_ref: self
  board_ref: life_center_operations
  execution_scope: life
  repo_ids: []
  status_mapping:
