# Reference experiments — ONE per target type (mission §4, §15). Each proves the
# target type rides the SAME registry / runner / verifier / promotion lifecycle as the
# worked retrieval + judge examples. Measured deterministically by the harnesses in
# src/command_center/improvement/harness_library.py; no live model needed.
# Generated; edit harness_library.py + regenerate rather than hand-tuning.

schema_version: command-center.improvement.v1
experiments:
- experiment_id: EXP-model-ref
  title: '[ref] model target rides the full improvement lifecycle'
  owner: geoff
  target_type: model
  target_ref: command_center.improvement.harness_library:model
  problem_statement: Demonstrate a bounded model change measured deterministically.
  hypothesis: The candidate model improves the required metric without safety regression.
  baseline: baseline model (harness baseline role)
  candidate: candidate model (harness candidate role)
  risk_tier: L2_local_edits
  automated: true
  created_at: '2026-06-13'
  expires_at: '2026-09-13'
  metrics:
  - name: task_accuracy
    direction: increase
    required: true
    baseline_source: 'harness: baseline measurement'
    candidate_source: 'harness: candidate measurement'
    minimum_improvement: 0.05
    maximum_regression: 0.0
  - name: unsafe_outputs
    direction: decrease
    required: true
    baseline_source: 'harness: baseline measurement'
    candidate_source: 'harness: candidate measurement'
    safety: true
    maximum_regression: 0.0
  budgets:
    max_iterations: 3
    max_wall_minutes: 10
    max_input_tokens: 0
    max_output_tokens: 0
    max_cost_usd: 0
    max_gpu_hours: 0
    max_changed_files: 5
    max_diff_lines: 300
  verification:
    independent_context: true
    different_model_family_preferred: true
    allow_self_verification: false
    reproduce_commands:
    - python -m command_center.cli.improvement verify EXP-model-ref --apply
    required_evidence:
    - raw before/after logs
    - metric summary with sample count
  promotion:
    human_approval_required: true
    canary_required: true
    rollback_required: true
    automatic_promotion: false
    minimum_observation_period: 24h
    elevated_human_review: false
  post_watch:
    checkpoints:
    - 1h
    - 24h
    - 7d
    monitored_metrics:
    - task_accuracy
    - unsafe_outputs
    rollback_triggers:
    - task_accuracy regresses vs promoted baseline
    - a safety metric regresses
