# The content ENGINE (validated by command_center.schemas.ContentPipelineConfig).
# Distinct from content.yaml (the publisher). Flow:
#   gather evidence-backed candidates -> draft breakdown posts (best local model)
#   -> multi-viewpoint judge panel (escalate the advanced parts) -> stage top-N
#   as In Queue drafts for human approval. No claim ships without evidence.
schema_version: "1"

# AppFlowy connection (reads the curator DBs + writes In Queue cards) - reuses
# the same env keys as the publisher / kanban bridge.
source:
  growthos_root: appflowy_kanban/growth-os
  database_map_path: config/databases.json

# Local model routing (LiteLLM). Drafting on a template-parsed instruct model;
# judging on the local-judge role. Secrets/URLs named, not stored.
litellm_base_url: http://localhost:4000
litellm_key_env: LITELLM_MASTER_KEY
draft_role: chat              # qwen3:30b
judge_role: local-judge       # qwen3:30b -> devstral:24b failover

own_repos_root: ".."          # docker_projects, relative to llm_station
lookback_days: 14
candidates_per_run: 25
surface_top: 5

# The judge panel - the four viewpoints the user chose. factual_currency needs
# the live web, so it escalates to the advanced (Claude Code) tier.
judges:
  - {key: factual_currency, blocking: true, needs_web: true}
  - {key: technical,        blocking: true}
  - {key: brand_voice,      blocking: false}   # voice is advisory, not a hard block
  - {key: no_overreach,     blocking: true}    # claims must trace to evidence

# Provider-agnostic routing. Local-first: the default policy runs on Ollama via
# the local LiteLLM role and is the ONLY path enabled by default. The cheap/
# frontier external policies are METADATA for the dry-run cost estimator - they
# never make a live call from here; a live paid route is operator-gated (budget +
# redaction + explicit egress). GLM-5.2 is escalation, not the post formatter.
content_llm:
  default_policy: local_first
  policies:
    - name: local_first
      primary: chat              # local LiteLLM role (qwen3:30b)
      fallback: local-judge      # devstral:24b failover role
      allow_paid: false
    - name: cheap_external       # first paid step IF ever enabled - not GLM-5.2
      primary: openrouter/z-ai/glm-4.7-flash
      allow_paid: true
      max_request_usd: 0.05
      require_redaction: true
    - name: frontier_external    # explicit escalation only
      primary: openrouter/z-ai/glm-5.2
      allow_paid: true
      max_request_usd: 0.25
      require_redaction: true
      human_approval: true
  # Public list prices (USD / million tokens), for cost estimation only. Verify
  # before any live use - provider prices drift.
  prices:
    - {model: openrouter/z-ai/glm-4.7-flash,        input_usd_per_mtok: 0.06,  output_usd_per_mtok: 0.40, context_window: 203000}
    - {model: openrouter/z-ai/glm-5,                input_usd_per_mtok: 0.60,  output_usd_per_mtok: 1.92, context_window: 203000}
    - {model: openrouter/z-ai/glm-5.2,              input_usd_per_mtok: 1.00,  output_usd_per_mtok: 4.00, context_window: 1000000}
    - {model: openrouter/moonshotai/kimi-k2.7-code, input_usd_per_mtok: 0.612, output_usd_per_mtok: 3.069, context_window: 262000}

streams:
  - name: personal
    board: geoffhadfield32_content
    curator_dbs: [papers, repos, signals]
    topics: []                # take the full ML/AI/data-eng field
    own_repos: [llm_station, betts_basketball, bball_homography_pipeline]
    pillar: ML & Data Engineering
    voice: >
      First-person voice of an ML / data-science engineer building in public.
      Mixes external papers/repos with the author's own developments. Credible,
      specific, no hype; ends with a question. Good for a data-science image.
  - name: business
    board: world_model_sports_content
    curator_dbs: [papers, repos, signals]
    topics: [basketball, nba, sports, player tracking, pose, homography, court, athlete]
    own_repos: [bball_homography_pipeline, betts_basketball]
    pillar: World Model Sports
    voice: >
      World Model Sports company voice ("we"). Basketball science and applicable
      sports science - perception (CV/tracking/3D) plus forecasting. Rigorous,
      honest about uncertainty, ties to building a world model for basketball.
