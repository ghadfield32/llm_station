schema_version: command-center.environments.v1

# One environment per activity. Open this file to answer "what can X access?".
# Invariant (enforced): repo_task is ephemeral and holds NO secrets.
environments:
  - name: cc-control-vps
    kind: control_plane
    host: vps
    persistent: true
    allowed_egress: [tailscale, provider_apis, github_api]
    allowed_secrets: [LITELLM_MASTER_KEY, HERMES_LITELLM_KEY, JUDGE_GATE_LITELLM_KEY, LEDGER_APPROVAL_SECRET]

  - name: cc-worker-4090
    kind: worker
    host: desktop-4090
    gpu_required: true
    gpu_vram_gb: 24            # RTX 4090; the PRIMARY budget `make model-fit` sizes against
    persistent: true
    allowed_egress: [tailscale, litellm, github, package_registries]
    allowed_secrets: [GITHUB_TOKEN]

  # The mobile workstation. A model that "fits the laptop" must clear THIS 16 GB
  # ceiling, not the 24 GB card — qwen3-coder:30b (~19 GB) does not fit here, which
  # is why the triage-5080 failover in models.yaml is whitelisted to devstral:24b
  # (~14 GB). Disabled as a serving node until the tailnet endpoint is real, but the
  # budget is declared so the scout/watchlist can size laptop-fit honestly at 16 GB.
  - name: cc-dev-5080
    kind: worker
    host: laptop-5080
    gpu_required: true
    gpu_vram_gb: 16           # RTX 5080 laptop; the SECONDARY (mobile) fit budget
    persistent: true
    allowed_egress: [tailscale, litellm, github, package_registries]
    allowed_secrets: [GITHUB_TOKEN]

  - name: cc-repo-task
    kind: repo_task
    host: desktop-4090
    devcontainer_path: .devcontainer/devcontainer.json
    image: generated/devcontainers/python-ml
    max_parallel_tasks: 1
    persistent: false
    allowed_egress: [litellm, github, package_registries]
    allowed_secrets: []

  - name: cc-judge
    kind: judge
    host: vps
    persistent: true
    allowed_egress: [litellm]
    allowed_secrets: [JUDGE_GATE_LITELLM_KEY]

  - name: cc-relay
    kind: relay
    host: mini-pc
    persistent: true
    allowed_egress: [tailscale]
    allowed_secrets: []
