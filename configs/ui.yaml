schema_version: command-center.ui.v1

# Human UI surfaces. The WebUI (nesquena/hermes-webui) is an optional Phase-4
# convenience layer over the SAME Hermes agent — it is NOT the policy layer.
# External writes still flow through the Ledger/Judge Gate/GitHub gates; the
# contract forbids declaring otherwise, and forbids public exposure without a
# password. Edit this file, then `make ui-validate`.

hermes_webui:
  enabled: false                       # turn on in Phase 4, after the core works
  host: 127.0.0.1                      # loopback only; reach over Tailscale
  port: 8787
  password_required: true             # mandatory once host != loopback
  container_mode: single              # single avoids the #681 two-container tool-location limit
  workspace_mount: /workspace
  external_write_policy: governed_by_ledger   # never webui_direct
  shell_approval_policy: human_only_for_dangerous
