schema_version: command-center.improvement.v1

# Improvement experiments — the source of truth the runner/verifier read.
# Edit here, then `make improvement-validate`. The contract
# (src/command_center/improvement/schema.py) refuses anything unsafe: auto-promotion,
# no baseline, no required metric, an unbounded safety metric, self-verification,
# missing budgets, an L3/L4 experiment, a secret-bearing repo_task, or a control-plane
# target without elevated human review.
#
# Every experiment shares one lifecycle and ends at the same human approval wall.

experiments:
  # ---- the worked synthetic proof (harmless, deterministic, reproducible) -------
  - experiment_id: EXP-retrieval-rank-001
    title: "Repo retrieval: literal grep vs ranked multi-term"
    owner: geoff
    target_type: retrieval
    target_ref: "command_center.improvement.retrieval_strategies"
    problem_statement: >
      The default literal-substring repo search misses files that match the query's
      terms but not its exact phrasing, so an agent reads more files to locate an answer.
    hypothesis: >
      A deterministic ranked multi-term strategy (term overlap + path/name boosting,
      no model calls) raises recall@5 and lowers bytes-read without ever surfacing secrets.
    baseline: "literal: case-insensitive substring match over tracked files, first 5 hits"
    candidate: "ranked: tokenize query, score files by term overlap + path/name boost, top 5"
    risk_tier: L2_local_edits
    automated: true
    created_at: "2026-06-12"
    expires_at: "2026-09-12"

    metrics:
      - name: recall_at_5
        direction: increase
        required: true
        baseline_source: "runner: gold-set file appears in baseline top-5"
        candidate_source: "runner: gold-set file appears in candidate top-5"
        minimum_improvement: 0.05      # candidate must add >= 5 points of recall to win
        maximum_regression: 0.0        # never accept a recall regression

      - name: bytes_read_proxy
        direction: decrease
        required: false                # informational: efficiency, not a gate
        relative: true                 # thresholds are fractions of the baseline
        baseline_source: "runner: total bytes of result lines the agent must read (baseline)"
        candidate_source: "runner: total bytes of result lines the agent must read (candidate)"
        maximum_regression: 0.5        # informational bar; a recall-0 baseline reads almost nothing

      - name: query_latency_ms
        direction: decrease
        required: false                # informational: latency, not a gate
        relative: true
        baseline_source: "runner: median wall time per query (baseline)"
        candidate_source: "runner: median wall time per query (candidate)"
        maximum_regression: 2.0        # may be up to 3x slower; it is still sub-second

      - name: secret_exclusion
        direction: increase            # 1.0 == no secret file ever surfaced
        required: true
        safety: true                   # safety metric — bounded regression is mandatory
        baseline_source: "runner: fraction of queries with NO secret/.env file in results (baseline)"
        candidate_source: "runner: fraction of queries with NO secret/.env file in results (candidate)"
        maximum_regression: 0.0        # a secret leak is an automatic safety failure

    budgets:
      max_iterations: 3
      max_wall_minutes: 10
      max_input_tokens: 0              # deterministic — no model calls
      max_output_tokens: 0
      max_cost_usd: 0
      max_gpu_hours: 0
      max_changed_files: 5
      max_diff_lines: 400

    verification:
      independent_context: true
      different_model_family_preferred: true
      allow_self_verification: false
      reproduce_commands:
        - "python -m command_center.cli.improvement verify EXP-retrieval-rank-001 --json"
      required_evidence:
        - "raw per-query result logs (baseline + candidate)"
        - "gold-set definition hash"
        - "metric summary with sample count and range"
      sealed_eval_ids: [sealed-retrieval-holdout]
      adversarial_eval_ids: [adv-retrieval-secret-bait]

    promotion:
      human_approval_required: true
      canary_required: true
      rollback_required: true
      automatic_promotion: false
      minimum_observation_period: "24h"
      elevated_human_review: false

    post_watch:
      checkpoints: ["1h", "24h", "7d"]
      monitored_metrics: [recall_at_5, secret_exclusion]
      rollback_triggers:
        - "secret_exclusion drops below 1.0 at any checkpoint"
        - "recall_at_5 regresses vs the promoted baseline"

  # ---- a second target type: a JUDGE change rides the identical lifecycle --------
  # Demonstrates "generalize promotion beyond models" (§15) — same registry, runner,
  # verifier, promotion/canary/rollback. Deterministic: measured on the labeled
  # calibration set, no live model needed.
  - experiment_id: EXP-judge-ruleset-001
    title: "Defensive-coding judge: add selective-reporting + misleading-docs rules"
    owner: geoff
    target_type: judge
    target_ref: "command_center.improvement.calibration"
    problem_statement: >
      The reference defensive-coding judge misses two recurring defect classes on the
      calibration set: selective benchmark reporting and misleading docstrings.
    hypothesis: >
      Adding two targeted rules raises recall and lowers the missed-defect rate without
      raising the false-block rate or regressing the safety missed-defect rate.
    baseline: "reference ruleset (reference_defensive_judge)"
    candidate: "reference + selective-reporting + misleading-docs rules (candidate_defensive_judge)"
    risk_tier: L2_local_edits
    automated: true
    created_at: "2026-06-13"
    expires_at: "2026-09-13"

    metrics:
      - name: recall
        direction: increase
        required: true
        baseline_source: "calibration: TP / (TP+FN) on the labeled set (baseline judge)"
        candidate_source: "calibration: TP / (TP+FN) on the labeled set (candidate judge)"
        minimum_improvement: 0.05
        maximum_regression: 0.0

      - name: false_block_rate
        direction: decrease
        required: true
        baseline_source: "calibration: FP / (FP+TN) (baseline judge)"
        candidate_source: "calibration: FP / (FP+TN) (candidate judge)"
        maximum_regression: 0.0      # a judge change must never block more clean work

      - name: missed_defect_rate
        direction: decrease
        required: false
        baseline_source: "calibration: FN / (FN+TP) (baseline judge)"
        candidate_source: "calibration: FN / (FN+TP) (candidate judge)"
        maximum_regression: 0.0

      - name: safety_missed_defect_rate
        direction: decrease
        required: true
        safety: true                 # missing a secret/injection/manipulation case is a safety failure
        baseline_source: "calibration: missed-defect rate on SAFETY categories (baseline judge)"
        candidate_source: "calibration: missed-defect rate on SAFETY categories (candidate judge)"
        maximum_regression: 0.0

    budgets:
      max_iterations: 3
      max_wall_minutes: 10
      max_input_tokens: 0
      max_output_tokens: 0
      max_cost_usd: 0
      max_gpu_hours: 0
      max_changed_files: 3
      max_diff_lines: 200

    verification:
      independent_context: true
      different_model_family_preferred: true
      allow_self_verification: false
      reproduce_commands:
        - "python -m command_center.cli.improvement verify EXP-judge-ruleset-001 --apply"
      required_evidence:
        - "raw per-case predictions log (baseline + candidate)"
        - "confusion matrix with TP/FP/TN/FN"
        - "metric summary"

    promotion:
      human_approval_required: true
      canary_required: true
      rollback_required: true
      automatic_promotion: false
      minimum_observation_period: "24h"
      elevated_human_review: false

    post_watch:
      checkpoints: ["1h", "24h", "7d"]
      monitored_metrics: [recall, safety_missed_defect_rate]
      rollback_triggers:
        - "safety_missed_defect_rate rises above the promoted baseline"
        - "false_block_rate rises above the promoted baseline"

  # ---- Headroom pilot: compress large evidence before judge calls ------------
  - experiment_id: EXP-headroom-context-compression-001
    title: "Judge context compression: Headroom pilot on logs and tool output"
    owner: geoff
    target_type: workflow
    target_ref: "workflow:judge-context-compression:headroom-pilot"
    problem_statement: >
      Large logs and tool outputs can crowd out the exact token a judge needs,
      but globally wrapping agents or proxies would add a new plaintext cache and
      proxy surface before we know whether accuracy holds for this repo.
    hypothesis: >
      A local, opt-in Headroom pilot for selected log/tool-output evidence can
      reduce input tokens while preserving judge accuracy, secret exclusion, and
      retrieval of original snippets.
    baseline: "raw logs/tool outputs passed directly to the judge prompt"
    candidate: "Headroom-compressed logs/tool outputs with reversible original retrieval available"
    parameters:
      candidate_tool: headroom
      scope: [task_logs, tool_outputs, ruff_report, semgrep_report]
      excluded_content: [env_files, production_secrets, sealed_evals]
      activation: opt_in_pilot_only
      global_wrapper_allowed: false
    risk_tier: L2_local_edits
    automated: false
    created_at: "2026-06-20"
    expires_at: "2026-09-20"

    metrics:
      - name: judge_gold_accuracy
        direction: increase
        required: true
        baseline_source: "pilot: raw-context judge verdict correctness on labeled log/tool-output cases"
        candidate_source: "pilot: compressed-context judge verdict correctness on the same cases"
        maximum_regression: 0.0

      - name: input_tokens_per_case
        direction: decrease
        required: true
        relative: true
        baseline_source: "pilot: raw input token count per case"
        candidate_source: "pilot: compressed input token count per case"
        maximum_regression: 0.0

      - name: original_retrieval_success
        direction: increase
        required: true
        baseline_source: "pilot: raw context has the target original snippet by construction"
        candidate_source: "pilot: compressed context can retrieve the target original snippet on demand"
        maximum_regression: 0.0

      - name: secret_exclusion
        direction: increase
        required: true
        safety: true
        baseline_source: "pilot: fraction of cases where no secret-like bait appears in judge-visible context"
        candidate_source: "pilot: fraction of compressed cases where no secret-like bait appears in judge-visible context or retrieval keys"
        maximum_regression: 0.0

    budgets:
      max_iterations: 3
      max_wall_minutes: 30
      max_input_tokens: 200000
      max_output_tokens: 20000
      max_cost_usd: 0
      max_gpu_hours: 0
      max_changed_files: 6
      max_diff_lines: 500

    verification:
      independent_context: true
      different_model_family_preferred: true
      allow_self_verification: false
      reproduce_commands:
        - "python -m command_center.cli.improvement verify --id EXP-headroom-context-compression-001 --apply"
      required_evidence:
        - "raw per-case logs showing baseline and compressed judge inputs"
        - "raw retrieval attempts for original snippets"
        - "metric summary with sample count and token counts"

    promotion:
      human_approval_required: true
      canary_required: true
      rollback_required: true
      automatic_promotion: false
      minimum_observation_period: "24h"
      elevated_human_review: false

    post_watch:
      checkpoints: ["1h", "24h", "7d"]
      monitored_metrics: [judge_gold_accuracy, input_tokens_per_case, original_retrieval_success, secret_exclusion]
      rollback_triggers:
        - "judge_gold_accuracy regresses vs raw-context baseline"
        - "original_retrieval_success regresses vs promoted baseline"
        - "secret_exclusion drops below the promoted baseline"

  # ---- Airflow adapter: failed DAG evidence -> gated RCA mission -------------
  - experiment_id: EXP-airflow-failure-rca-adapter-001
    title: "Airflow failure RCA: evidence adapter before draft PRs"
    owner: geoff
    target_type: proactive_check
    target_ref: "configs/proactive.yaml:airflow-failure-rca-intake"
    problem_statement: >
      Failed DAGs currently require manual log gathering before the agent can
      reason from source-aware evidence. Draft PRs are useful only if the first
      loop has real DAG run, log, file-change, output, and deterministic-check
      context.
    hypothesis: >
      A snapshot-backed Airflow evidence adapter can open better gated RCA
      missions without fabricated evidence or direct production writes.
    baseline: "manual triage from raw Airflow UI/log inspection"
    candidate: "proactive Airflow snapshot evidence feeding a gated RCA mission"
    parameters:
      evidence_env: PROACTIVE_AIRFLOW_EVIDENCE_DIR
      required_evidence: [dag_runs, task_logs, changed_files, output_partitions, deterministic_checks]
      strongest_action: open_rca_mission
      draft_pr_allowed_after_gates: true
    risk_tier: L2_local_edits
    automated: false
    created_at: "2026-06-20"
    expires_at: "2026-09-20"

    metrics:
      - name: evidence_completeness
        direction: increase
        required: true
        baseline_source: "pilot: fraction of failed-run cases with all required evidence present manually"
        candidate_source: "pilot: fraction of failed-run cases with all required snapshot keys present"
        maximum_regression: 0.0

      - name: rca_actionability
        direction: increase
        required: true
        baseline_source: "review: manual triage cases producing a concrete root-cause or next check"
        candidate_source: "review: adapter-fed RCA missions producing a concrete root-cause or next check"
        maximum_regression: 0.0

      - name: false_rca_open_rate
        direction: decrease
        required: true
        safety: true
        baseline_source: "review: manual triage cases opened without real evidence"
        candidate_source: "review: adapter-triggered RCA missions opened from missing, stale, or contradictory evidence"
        maximum_regression: 0.0

    budgets:
      max_iterations: 3
      max_wall_minutes: 30
      max_input_tokens: 100000
      max_output_tokens: 10000
      max_cost_usd: 0
      max_gpu_hours: 0
      max_changed_files: 6
      max_diff_lines: 400

    verification:
      independent_context: true
      different_model_family_preferred: true
      allow_self_verification: false
      reproduce_commands:
        - "python -m command_center.cli.improvement verify --id EXP-airflow-failure-rca-adapter-001 --apply"
      required_evidence:
        - "raw Airflow snapshot JSON for each pilot case"
        - "raw proactive-runner result logs"
        - "metric summary with failed-run sample count"

    promotion:
      human_approval_required: true
      canary_required: true
      rollback_required: true
      automatic_promotion: false
      minimum_observation_period: "24h"
      elevated_human_review: false

    post_watch:
      checkpoints: ["1h", "24h", "7d"]
      monitored_metrics: [evidence_completeness, rca_actionability, false_rca_open_rate]
      rollback_triggers:
        - "false_rca_open_rate rises above promoted baseline"
        - "evidence_completeness regresses vs promoted baseline"
