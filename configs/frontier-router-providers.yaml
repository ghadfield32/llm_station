schema_version: command-center.frontier-router-providers.v1

# Paid frontier-API BACKUP lane (separate from the local-only LiteLLM gateway). For open-weight
# models too large to run locally (GLM-5.2, Kimi K2). This file is PURE METADATA — it executes
# nothing. Naming `secret_env: OPENROUTER_API_KEY` here is the env var to read at runtime, NOT a
# key in .env (the local-only contract + check_forbidden_providers stay intact). The lane is OFF
# by default; turning it on is a deliberate, budgeted operator decision (see
# configs/frontier-router-budgets.yaml + docs/MASTER.md "Frontier router backup lane"). Prices
# are public signals as of 2026-06-20; the runner ranks providers by ESTIMATED cost at run time
# (never a hardcoded "cheapest"). Router-backed models are NEVER local incumbents.

providers:
  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_style: openai_compatible
    secret_env: OPENROUTER_API_KEY
    default_policy: disabled_until_budgeted
    data_policy_required: true

  z_ai_direct:
    base_url: https://api.z.ai/api/coding/paas/v4
    api_style: anthropic_compatible
    secret_env: ZAI_API_KEY
    default_policy: disabled_until_budgeted
    data_policy_required: true

# Prices drift — they are dated public signals, not frozen truth. `router_price_audit`
# flags any candidate whose price_observed_at is older than price_freshness.max_age_days;
# it NEVER auto-overwrites a price (auto_update is contract-refused).
price_freshness:
  max_age_days: 14
  stale_action: warn_in_scan
  auto_update: false

# 2026-07-10 top-3 pick (research: WebSearch against OpenRouter's own listing pages +
# artificialanalysis.ai's July 2026 Intelligence Index; see docs/reviews/2026-07-10-frontier-model-pick.md
# for the full comparison and citations). All three are open-weight, all three are the CURRENT
# generation as of this date, and — per Artificial Analysis's July 2026 index — they hold the
# top 3 open-weight positions: GLM-5.2 (51.1, #1 open-weight), DeepSeek V4 Pro (44.3, #2),
# Kimi K2.6 (44.2, #3). None fit local VRAM (frontier_watch lane) — this file is the ONLY path
# to using them, and only once an operator budgets + keys the lane (see frontier-router-budgets.yaml).
models:
  glm-5.2:                       # local_lane stays frontier_watch (does_not_fit 24/16/56 GB)
    local_lane: frontier_watch
    router_candidates:
      - provider: openrouter
        model: z-ai/glm-5.2
        input_usd_per_mtok: 0.532
        output_usd_per_mtok: 1.672
        context_tokens: 1048576
        price_source: https://openrouter.ai/z-ai/glm-5.2
        price_observed_at: "2026-07-10"
        price_is_drift_prone: true
      - provider: z_ai_direct
        model: glm-5.2
        input_usd_per_mtok: 1.40
        cached_input_usd_per_mtok: 0.26
        output_usd_per_mtok: 4.40
        context_tokens: 200000
        price_source: public_provider_page
        price_observed_at: "2026-06-20"
        price_is_drift_prone: true

  # DeepSeek V4 Pro (1.6T total / 49B active MoE): #2 open-weight on the July 2026 AA index,
  # wins on LiveCodeBench, the 1M-token context, and PRICE — the cheapest of the top 3.
  deepseek-v4-pro:
    local_lane: frontier_watch
    router_candidates:
      - provider: openrouter
        model: deepseek/deepseek-v4-pro
        input_usd_per_mtok: 0.435
        output_usd_per_mtok: 0.87
        context_tokens: 1048576
        price_source: https://openrouter.ai/deepseek/deepseek-v4-pro
        price_observed_at: "2026-07-10"
        price_is_drift_prone: true

  # Kimi K2.6 (Moonshot AI): #3 open-weight on the July 2026 AA index; wins SWE-bench Pro
  # (58.6% vs DeepSeek V4 Pro's 55.4%), HLE-with-tools, native agent swarms, and multimodal —
  # the strongest of the three on agentic/tool-use quality, which is our chat role's KPI.
  kimi-k2.6:
    local_lane: frontier_watch
    router_candidates:
      - provider: openrouter
        model: moonshotai/kimi-k2.6
        input_usd_per_mtok: 0.66
        output_usd_per_mtok: 3.41
        context_tokens: 262144
        price_source: https://openrouter.ai/moonshotai/kimi-k2.6
        price_observed_at: "2026-07-10"
        price_is_drift_prone: true

  # Prior Kimi generations — kept for continuity/comparison, superseded by kimi-k2.6 above.
  kimi-k2:
    local_lane: frontier_watch
    router_candidates:
      - provider: openrouter
        model: moonshotai/kimi-k2
        input_usd_per_mtok: 0.57
        output_usd_per_mtok: 2.30
        context_tokens: 131000
        price_source: public_provider_page
        price_observed_at: "2026-06-20"
        price_is_drift_prone: true

  kimi-k2-thinking:
    local_lane: frontier_watch
    router_candidates:
      - provider: openrouter
        model: moonshotai/kimi-k2-thinking
        input_usd_per_mtok: 0.60
        output_usd_per_mtok: 2.50
        context_tokens: 262000
        price_source: public_provider_page
        price_observed_at: "2026-06-20"
        price_is_drift_prone: true

  kimi-k2.7-code:
    local_lane: frontier_watch
    router_candidates:
      - provider: openrouter
        model: moonshotai/kimi-k2.7-code
        input_usd_per_mtok: 0.612
        output_usd_per_mtok: 3.069
        context_tokens: 262000
        price_source: public_provider_page
        price_observed_at: "2026-06-20"
        price_is_drift_prone: true
