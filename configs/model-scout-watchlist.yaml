schema_version: command-center.model-scout-watchlist.v1

# Open-weight models we are TRACKING but have not promotion-joined. Two tiers:
#
#   frontier_watch  - real, strong, open-weight, but too large to run on this hardware.
#                     Recorded for awareness with an honest weights-only fit verdict.
#                     The scan turns these into a track-as-context note; it NEVER drafts
#                     a local benchmark for them (the live harness is Ollama-only and they
#                     do not fit). Frontier quality, when wanted, is a hosted-API decision
#                     OUTSIDE this local-only pipeline.
#   pull_to_verify  - plausibly fits the 24 GB worker (and maybe the 16 GB laptop); not yet
#                     installed. The scan drafts a propose-only "ollama pull + benchmark"
#                     candidate for the declared role(s). Promotion still requires the full
#                     curated-openweight digest join + canary + evals + a human tap.
#
# Trust tier: this file is CONTEXT, not promotion evidence. No score here ever substitutes
# for the repo's own local A/B (see docs/MASTER.md 6.5). parameter_count_b is TOTAL params
# (what drives the memory footprint); reference_quant feeds the weights-only lower bound.

records:
  # ── frontier_watch: real flagships that do NOT fit 24 GB VRAM + 32 GB RAM ──────────────
  - record_id: glm-5.2-frontier-2026-06
    tier: frontier_watch
    model_family: glm
    release_id: GLM-5.2
    source_model_url: https://huggingface.co/unsloth/GLM-5.2-GGUF
    parameter_count_b: 754.0
    active_param_count_b: 40.0
    is_moe: true
    reference_quant: Q4_K_M
    context_length: 1048576
    license: MIT
    ollama_tag: glm-5.2:cloud
    ollama_local: false
    local_artifact:
      type: gguf
      provider: unsloth
      smallest_verified_size_gb: 217
      quant: UD-IQ1_S
    open_weight_evidence: >-
      Z.ai open-sourced GLM-5.2 (zai-org) under MIT; the current GLM flagship. The Unsloth
      GLM-5.2-GGUF HF page (2026-06-20) lists 754B total params / ~40B active MoE, 1M context,
      full weights ~1.51 TB, with the SMALLEST quantized files at 217 GB (1-bit UD-IQ1_S) and
      238 GB (2-bit UD-IQ2_XXS). (The "~23 GB" figure seen elsewhere is a single BF16 shard,
      not the whole model.)
    source_url: https://z.ai/blog/glm-5.2
    retrieval_timestamp: "2026-06-20"
    notes: >-
      Does NOT fit this hardware. Unsloth dynamic GGUF ladder: 1-bit UD-IQ1_S ~217 GB,
      2-bit UD-IQ2_XXS ~238 GB, 4-bit UD-Q4_K_M ~466 GB — the SMALLEST is still ~4x the 56 GB
      local budget; "runs locally" means a 256 GB unified-memory class machine. Track-as-context
      here; for its quality use the budgeted frontier-router lane (configs/frontier-router-*.yaml),
      never a local pull.

