      context. A credible reasoning/planner + judge candidate. Pull, then run the planner and
      local-judge suites against the qwen3:30b incumbents before any routing recommendation.
      Verify the digest/license join and canary tool-call template behavior first (the repo's
      qwen3-coder XML-leak history applies to any new tool-using model).
