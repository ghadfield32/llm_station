schema_version: command-center.models.v1

# Edit THIS file to change models. Then `make models`. No code touched.
# Local-only LiteLLM registry. Cloud coding happens through Claude Code and
# Codex executors, authenticated separately with subscription/OAuth login.
# Every role below must render to ollama_chat/... via OLLAMA_API_BASE.
#
# Each candidate may carry `status: active|scout` (default active). `active`
# candidates are routed (rendered into the LiteLLM model_list); `scout`
# candidates are a watchlist — tracked here, under evaluation, NOT routed —
# so a proposed model has one home alongside the roster. Inspect with
# `cc model-status`. Promotion stays human-only: `cc model-promote --role R
# --candidate ALIAS --approver YOU --apply` flips scout -> active.

roles:
  triage:
    - {alias: triage-local, provider: ollama, model: "qwen3-coder:30b", priority: 1, local: true, monthly_budget_usd: 0, vram_gb: 19, license: Apache-2.0}
    # Second-GPU failover (5080 laptop = `msi` on the tailnet). DISABLED until
    # that node is real, because shipping a dead endpoint makes the bot worse:
    #   1. on msi: set OLLAMA_HOST=0.0.0.0, run Ollama, `ollama pull devstral:24b`
    #      (the 5080 is 16 GB — it CANNOT fit qwen3-coder:30b ~19 GB; devstral
    #      Q4 ~14 GB fits and is whitelisted).
    #   2. set OLLAMA_API_BASE_5080=http://msi:11434 in .env (verify it answers).
    #   3. uncomment the line below, then `make models`. LiteLLM then
    #      load-balances triage across both GPUs (simple-shuffle) and retries
    #      the survivor if one is down — that is the "route to more GPU" path.
    # - {alias: triage-5080, provider: ollama, model: "devstral:24b", priority: 2, local: true, monthly_budget_usd: 0, vram_gb: 14, license: Apache-2.0, api_base_env: OLLAMA_API_BASE_5080}

  # Conversational chat surfaces (Discord/Slack/Telegram/WhatsApp gateway). This
  # role exists DISTINCT from `triage` for one verified reason: tool-call format.
  # qwen3-coder ships an Ollama RENDERER/PARSER (native, compiled-in) for its
  # `<tool_call><function=..><parameter=..>` XML; that parser DROPS the call when
  # the model narrates before calling a tool ("I'll search..." then the call) —
  # reproduced 7/8 (Ollama) and 6/6 (full LiteLLM path). The call then leaks to
  # the user as raw XML. qwen3 (instruct) uses Ollama's Go-template tool path,
  # which parses `<tool_call>{json}</tool_call>` regardless of surrounding prose
  # (0/8). Chat is tool-heavy and the model narrates, so it MUST use a
  # template-parsed model. Keep this role off qwen3-coder. See
  # docs/architecture/channels.md + WORKLOG.md (Channels / gateways).
  chat:
    - {alias: chat-qwen, provider: ollama, model: "qwen3:30b", priority: 1, local: true, monthly_budget_usd: 0, vram_gb: 19, license: Apache-2.0}

  local-judge:
    - {alias: judge-qwen, provider: ollama, model: "qwen3:30b", priority: 1, local: true, vram_gb: 19, license: Apache-2.0}
    - {alias: judge-devstral, provider: ollama, model: "devstral:24b", priority: 2, local: true, vram_gb: 14, license: Apache-2.0}

  # Hermes (HERMES_DEFAULT_MODEL=planner, docker-compose.yml) does its OWN
  # tool-calling against LiteLLM, so planner is a TOOL-USING role — same
  # constraint as `chat`: NO qwen3-coder. Its Ollama native parser drops a tool
  # call the model prefixes with prose (verified 7/8), leaking raw `<function=..>`
  # XML; qwen3 (instruct) parses tool calls via the Go-template path regardless of
  # prose. qwen3:30b plans + tool-calls reliably; devstral:24b is the cross-family
  # tool-robust failover. See `chat:` above + MASTER.md §14 (2026-06-13).
  planner:
    - {alias: planner-qwen, provider: ollama, model: "qwen3:30b", priority: 1, local: true, monthly_budget_usd: 0, vram_gb: 19, license: Apache-2.0}
    - {alias: planner-devstral, provider: ollama, model: "devstral:24b", priority: 2, local: true, monthly_budget_usd: 0, vram_gb: 14, license: Apache-2.0}

  coder:
    - {alias: coder-local, provider: ollama, model: "qwen3-coder:30b", priority: 1, local: true, monthly_budget_usd: 0, vram_gb: 19, license: Apache-2.0}

  architect-judge:
    - {alias: arch-local, provider: ollama, model: "qwen3-coder:30b", priority: 1, local: true, monthly_budget_usd: 0, vram_gb: 19, license: Apache-2.0}
    - {alias: arch-judge, provider: ollama, model: "qwen3:30b", priority: 2, local: true, monthly_budget_usd: 0, vram_gb: 19, license: Apache-2.0}

  security-judge:
    - {alias: security-local, provider: ollama, model: "qwen3:30b", priority: 1, local: true, monthly_budget_usd: 0, vram_gb: 19, license: Apache-2.0}
    - {alias: security-devstral, provider: ollama, model: "devstral:24b", priority: 2, local: true, monthly_budget_usd: 0, vram_gb: 14, license: Apache-2.0}

# The CLI agents that drive the leased worktree/devcontainer. Distinct from the
# local `coder` role above: the executor is the harness and uses its own
# subscription/OAuth login, not LiteLLM provider API keys. The `coder_alias`
# remains a contract reference so executor defaults stay tied to a real local
# route for dry-runs and fallback summaries.
executors:
  - {name: claude-code, family: anthropic, command: claude, coder_alias: coder-local, priority: 1}
  - {name: codex-cli, family: openai, command: codex, coder_alias: coder-local, priority: 2}

local_whitelist:
  - "qwen3-coder:30b"
  - "qwen3:30b"
  - "devstral:24b"

# The model scout proposes candidates and annotates each with VRAM fit on BOTH the
# 24 GB 4090 worker and the 16 GB 5080 laptop (WS1 gate). Discovery is keyless-first;
# provider routes stay forbidden in roles. curated-openweight is the versioned,
# provenance-clean, must-be-installed source; model-watchlist tracks un-pulled frontier
# (GLM-5.2, Kimi K2) and pull-to-verify models without installing them; artificial-analysis
# runs only if AA_API_KEY is set (optional tiebreaker). Source names are validated against
# KNOWN_SCOUT_SOURCES at `make validate` (a typo is rejected, not a silent runtime skip).
scout:
  cadence: monthly
  sources: [aider-polyglot, local-ollama-tags, curated-openweight, model-watchlist, artificial-analysis]
  propose_only: true
  max_candidates_per_run: 10
