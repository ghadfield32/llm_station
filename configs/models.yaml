schema_version: command-center.models.v1

# Edit THIS file to change models. Then `make models`. No code touched.
# Local-only LiteLLM registry. Cloud coding happens through Claude Code and
# Codex executors, authenticated separately with subscription/OAuth login.
# Every role below must render to ollama_chat/... via OLLAMA_API_BASE.

roles:
  triage:
    - {alias: triage-local, provider: ollama, model: "qwen3-coder:30b", priority: 1, local: true, monthly_budget_usd: 0, vram_gb: 19, license: Apache-2.0}
    # Second-GPU failover (5080 laptop = `msi` on the tailnet). DISABLED until
    # that node is real, because shipping a dead endpoint makes the bot worse:
    #   1. on msi: set OLLAMA_HOST=0.0.0.0, run Ollama, `ollama pull devstral:24b`
    #      (the 5080 is 16 GB — it CANNOT fit qwen3-coder:30b ~19 GB; devstral
    #      Q4 ~14 GB fits and is whitelisted).
    #   2. set OLLAMA_API_BASE_5080=http://msi:11434 in .env (verify it answers).
    #   3. uncomment the line below, then `make models`. LiteLLM then
    #      load-balances triage across both GPUs (simple-shuffle) and retries
    #      the survivor if one is down — that is the "route to more GPU" path.
    # - {alias: triage-5080, provider: ollama, model: "devstral:24b", priority: 2, local: true, monthly_budget_usd: 0, vram_gb: 14, license: Apache-2.0, api_base_env: OLLAMA_API_BASE_5080}

  local-judge:
    - {alias: judge-qwen, provider: ollama, model: "qwen3:30b", priority: 1, local: true, vram_gb: 19, license: Apache-2.0}
    - {alias: judge-devstral, provider: ollama, model: "devstral:24b", priority: 2, local: true, vram_gb: 14, license: Apache-2.0}

  planner:
    - {alias: planner-local, provider: ollama, model: "qwen3-coder:30b", priority: 1, local: true, monthly_budget_usd: 0, vram_gb: 19, license: Apache-2.0}
    - {alias: planner-judge, provider: ollama, model: "qwen3:30b", priority: 2, local: true, monthly_budget_usd: 0, vram_gb: 19, license: Apache-2.0}

  coder:
    - {alias: coder-local, provider: ollama, model: "qwen3-coder:30b", priority: 1, local: true, monthly_budget_usd: 0, vram_gb: 19, license: Apache-2.0}

  architect-judge:
    - {alias: arch-local, provider: ollama, model: "qwen3-coder:30b", priority: 1, local: true, monthly_budget_usd: 0, vram_gb: 19, license: Apache-2.0}
    - {alias: arch-judge, provider: ollama, model: "qwen3:30b", priority: 2, local: true, monthly_budget_usd: 0, vram_gb: 19, license: Apache-2.0}

  security-judge:
    - {alias: security-local, provider: ollama, model: "qwen3:30b", priority: 1, local: true, monthly_budget_usd: 0, vram_gb: 19, license: Apache-2.0}
    - {alias: security-devstral, provider: ollama, model: "devstral:24b", priority: 2, local: true, monthly_budget_usd: 0, vram_gb: 14, license: Apache-2.0}

# The CLI agents that drive the leased worktree/devcontainer. Distinct from the
# local `coder` role above: the executor is the harness and uses its own
# subscription/OAuth login, not LiteLLM provider API keys. The `coder_alias`
# remains a contract reference so executor defaults stay tied to a real local
# route for dry-runs and fallback summaries.
executors:
  - {name: claude-code, family: anthropic, command: claude, coder_alias: coder-local, priority: 1}
  - {name: codex-cli, family: openai, command: codex, coder_alias: coder-local, priority: 2}

local_whitelist:
  - "qwen3-coder:30b"
  - "qwen3:30b"
  - "devstral:24b"

# The model scout proposes candidates and annotates each with VRAM fit on the
# 4090 (WS1 gate). Discovery is keyless-first; provider routes stay forbidden in
# roles. artificial-analysis runs only if AA_API_KEY is set (optional tiebreaker).
scout:
  cadence: monthly
  sources: [aider-polyglot, local-ollama-tags, artificial-analysis]
  propose_only: true
  max_candidates_per_run: 10
