schema_version: command-center.kanban.v1
dry_run_default: true
ledger_base_url_env: LEDGER_BASE_URL
imported_state_path: generated/kanban-imported.json
sources:
- name: growth-os-appflowy
  kind: appflowy
  enabled: true
  growthos_root: appflowy_kanban/growth-os
  database: mission_intake
  database_map_path: config/databases.json
  base_url_env: APPFLOWY_BASE_URL
  workspace_id_env: APPFLOWY_WORKSPACE_ID
  email_env: APPFLOWY_EMAIL
  password_env: APPFLOWY_PASSWORD
sections:
- name: dags
  appflowy_section: DAGs
  target_kind: dag
  target: odds_ingest_daily
  default_repo: betts_basketball
  default_risk: L2_local_edits
  max_auto_risk: L2_local_edits
  ready_statuses:
  - Approved
  done_statuses:
  - Done
  - Rejected
  branch_prefix: kanban/dag
- name: learning
  appflowy_section: Learning
  target_kind: learning
  target: growth-os
  default_repo: learning
  default_risk: L1_plan_only
  max_auto_risk: L1_plan_only
  ready_statuses:
  - Approved
  done_statuses:
  - Done
  - Rejected
  branch_prefix: kanban/learning
- name: betts-basketball
  appflowy_section: Betts Basketball
  target_kind: repo
  target: betts_basketball
  default_repo: betts_basketball
  default_risk: L2_local_edits
  max_auto_risk: L2_local_edits
  ready_statuses:
  - Approved
  done_statuses:
  - Done
  - Rejected
  branch_prefix: kanban/betts
- name: command-center
  appflowy_section: Command Center
  target_kind: repo
  target: command-center
  default_repo: command-center
  default_risk: L1_plan_only
  max_auto_risk: L2_local_edits
  ready_statuses:
  - Approved
  done_statuses:
  - Done
  - Rejected
  branch_prefix: kanban/cc
