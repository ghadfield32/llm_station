schema_version: command-center.kanban.v1
dry_run_default: true
ledger_base_url_env: LEDGER_BASE_URL
imported_state_path: generated/kanban-imported.json
sources:
- name: command-center-board-store
  kind: command_center_ui
  enabled: true
  board_id: llm_station_command_center
  board_store_dir: generated/boards
  event_log_path: generated/kanban-events.jsonl
sections:
- name: dags
  board_section: DAGs
  target_kind: dag
  target: odds_ingest_daily
  default_repo: betts_basketball
  default_risk: L2_local_edits
  max_auto_risk: L2_local_edits
  ready_statuses:
  - Approved
  done_statuses:
  - Done
  - Rejected
  branch_prefix: kanban/dag
- name: learning
  board_section: Learning
  target_kind: learning
  target: growth-os
  default_repo: learning
  default_risk: L1_plan_only
  max_auto_risk: L1_plan_only
  ready_statuses:
  - Approved
  done_statuses:
  - Done
  - Rejected
  branch_prefix: kanban/learning
- name: betts-basketball
  board_section: Betts Basketball
  target_kind: repo
  target: betts_basketball
  default_repo: betts_basketball
  default_risk: L2_local_edits
  max_auto_risk: L2_local_edits
  ready_statuses:
  - Approved
  done_statuses:
  - Done
  - Rejected
  branch_prefix: kanban/betts
- name: command-center
  board_section: Command Center
  target_kind: repo
  target: command-center
  default_repo: command-center
  default_risk: L1_plan_only
  max_auto_risk: L2_local_edits
  ready_statuses:
  - Approved
  done_statuses:
  - Done
  - Rejected
  branch_prefix: kanban/cc
