schema_version: continuous-upgrade.experiment.v1
experiment_id: agt-17-skillopt-challenger
capability: SkillOpt-trained best_skill.md as a champion-challenger for frozen agents
state: WIRING_VERIFIED
created_at: '2026-07-24'
risk_tier: L2_local_edits
implementation_status: tool_installed_isolated
promotion_status: not_requested
hypothesis: >
  A SkillOpt-trained best_skill.md raises held-out task success versus the same
  frozen target with no learned skill, under SkillOpt's accept-only-if-improves
  gate — first on standard benchmarks (variety), then on llm_station cockpit tasks.
champion:
  definition: frozen target model + env initial skill (no learning)
challenger:
  definition: same frozen target + SkillOpt best_skill.md
  constraints:
    - no external egress on the local path (Ollama only)
    - no provider API key on the local path
    - no writing skills into agent config dirs without approval
    - no bypass of the human approval/merge walls to deploy a trained skill
    - no leakage (test split disjoint from train/selection)
    - no silent fallback; unknown recorded as unknown
verified_so_far:
  - install_on_windows: PASS (v0.2.0, import + train.py --help)
  - local_wiring: PASS (openai_compatible -> Ollama qwen3:8b; trainer reaches baseline eval)
  - materialization: PASS (searchqa: train=400 val=200 test=1400 from public HF)
  - baseline_number: 'searchqa no-skill qwen3:8b selection hard=0.6667 soft=0.8889 (3 items) — CONFIRMED'
  - windows_fix_found: 'PYTHONUTF8=1 required (U+2192 crashes cp1252 console)'
required_commands:
  - "git clone --depth 1 https://github.com/microsoft/SkillOpt.git && uv pip install -e ."
  - "uv pip install datasets && python scripts/materialize_searchqa.py"
  - "PYTHONUTF8=1 python scripts/train.py --config configs/searchqa/default.yaml --cfg-options model.target_backend=openai_compatible model.optimizer_backend=openai_compatible ... --out_root <dir>"
metrics:
  - name: held_out_test_accuracy_hard
    kind: runtime_evidence
    required: true
    acceptance: challenger >= champion, gate-accepted, reproduced, CAPABLE optimizer
  - name: no_egress_local_path
    kind: inspection
    required: true
    acceptance: local run makes no off-box calls (Ollama only)
  - name: no_leakage
    kind: split_check
    required: true
    acceptance: test disjoint from train/selection
unknown_values_policy: record unknown; do not estimate
rollback:
  note: "Tool lives in scratch (gitignored) + this committed design packet. Rollback = delete scratch dir + revert the packet commit. No repo/config/agent change made."
verifier:
  independent_context_required: true
  latest_result: NOT_RUN
  note: "PILOT lift claims require a fresh non-authoring session to reproduce champion-vs-challenger before promotion."
