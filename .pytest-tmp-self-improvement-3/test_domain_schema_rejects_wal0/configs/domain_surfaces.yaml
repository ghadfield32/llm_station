schema_version: command-center.domain-surfaces.v1
domains:
- domain_id: betts_basketball_grand_todo
  title: "Betts Grand TODO \u2014 Source Tracker"
  card_component: generic_task
  source: board_store
  board_id: betts_basketball_grand_todo
  columns:
  - Backlog
  - Ready
  - In Progress
  - Blocked
  - Done
  - Archived
  column_actions:
    Backlog: add_mission_card
    Ready: stage_card
    In Progress: start_todo
    Blocked: block_card
    Done: finish_todo
    Archived: finish_todo
  summary_fields:
  - name: item_id
    label: Item
  - name: category
    label: Category
    kind: badge
  - name: source_status
    label: Source status
    kind: badge
  - name: target
    label: Target
  drawer_fields:
  - name: description
    label: Canonical tracker entry
    kind: markdown
  - name: source_notes
    label: Source notes
    kind: markdown
  - name: completed
    label: Completed
  - name: source_ref
    label: Canonical source
  - name: source_sha256
    label: Source SHA-256
  - name: source_revision_count
    label: Preserved revisions
  allowed_actions:
  - stage_card
  - start_todo
  - finish_todo
  - block_card
  intake:
    producer: grand_todo_import
    mode: projection
    summary: Canonical Betts GRAND TODO Markdown is reconciled only by an explicit
      sync or a governed card mutation; board reads are read-only.
    schedule: explicit sync; board view polls the stored projection
    source_refs:
    - betts_basketball/docs/backend/projects/GRAND_TODO_LIST.md
    parameters: {}
    editable: false
  empty_state:
    title: GRAND TODO not imported yet
    hint: Preview the canonical Betts tracker, then apply its merge-only projection.
    command: uv run cc grand-todo-import --apply
- domain_id: job_application
  title: Jobs
  card_component: job_application
  source: board_store
  board_id: job_search_pipeline_internal
  columns:
  - Suggested Jobs
  - Selected by Geoff
  - In Progress
  - Needs Geoff
  - Completed
  - Interviewing
  - Rejected / Skip
  - Closed / Archived
  column_actions:
    Suggested Jobs: add_mission_card
    Selected by Geoff: stage_card
    In Progress: start_todo
    Needs Geoff: block_card
    Completed: finish_todo
    Interviewing: stage_card
    Rejected / Skip: reject_card
    Closed / Archived: finish_todo
  summary_fields:
  - name: company
    label: Company
  - name: role_title
    label: Role
  - name: fit_score
    label: Fit
    kind: score
  - name: salary_text
    label: Salary
    kind: money
  - name: automation_class
    label: Automation
    kind: badge
  - name: resume_variant
    label: Resume
    kind: badge
  drawer_fields:
  - name: why_apply
    label: Why apply
    kind: markdown
  - name: risks
    label: Risks
    kind: markdown
  - name: score_explanation
    label: Score explanation
    kind: markdown
  - name: manual_reason
    label: Manual blockers
    kind: markdown
  - name: apply_url
    label: Posting
    kind: url
  - name: portal
    label: Portal
    kind: badge
  - name: location
    label: Location
  - name: remote_type
    label: Remote
    kind: badge
  - name: deadline
    label: Deadline
    kind: datetime
  - name: next_action
    label: Next action
    kind: markdown
  - name: materials_path
    label: Materials
  allowed_actions:
  - stage_card
  - start_todo
  - block_card
  - reject_card
  - finish_todo
  intake:
    producer: job_search_daily
    mode: scheduled
    summary: Ranked job discovery and pasted postings feed this application pipeline.
    schedule: daily and on demand
    source_refs:
    - configs/job_search.yaml
    - data/job_search/profile/search_settings.yml
    parameters: {}
    editable: false
  empty_state:
    title: No jobs surfaced yet
    hint: The daily DAG writes ranked suggestions here; you can also rank a pasted
      posting.
    command: uv run cc job-search suggest --from-file <posting.md>
- domain_id: linkedin_post
  title: Posts
  card_component: linkedin_post
  source: board_store
  board_id: linkedin_content_pipeline_internal
  columns:
  - Draft
  - In Queue
  - Scheduled
  - Published
  - Needs Geoff
  column_actions:
    Draft: add_mission_card
    In Queue: stage_card
    Scheduled: start_todo
    Published: finish_todo
    Needs Geoff: block_card
  summary_fields:
  - name: account
    label: Account
    kind: badge
  - name: hook
    label: Hook
  - name: scheduled_for
    label: Scheduled
    kind: datetime
  - name: approval_state
    label: Approval
    kind: badge
  drawer_fields:
  - name: body
    label: Post
    kind: markdown
  - name: tags
    label: Tags
    kind: list
  - name: source_ref
    label: Source
  - name: post_urn
    label: PostURN
  allowed_actions:
  - stage_card
  - block_card
  - reject_card
  intake:
    producer: cockpit_composer
    mode: manual
    summary: Human-reviewed LinkedIn drafts are composed directly in the cockpit.
    schedule: on demand
    source_refs:
    - configs/content.yaml
    parameters:
      instructions: Add source-backed post ideas and keep publishing human-approved.
    editable: true
  empty_state:
    title: No posts queued
    hint: Create a draft here, review its LinkedIn preview, then move it through the
      queue.
    command: Open Posts and choose New post
