    label: Analysis status
    kind: badge
  - name: analysis_schema_version
    label: Analysis contract
    kind: badge
  - name: analysis_origin
    label: Analysis origin
    kind: badge
  - name: analysis_model
    label: Analysis model
  - name: analysis_generated_at
    label: Analysis generated
    kind: datetime
  - name: analysis_input_sha256
    label: Analysis input SHA-256
  - name: analysis_error_code
    label: Analysis error
    kind: badge
  allowed_actions:
  - stage_card
  - start_todo
  - finish_todo
  intake:
    producer: growth_os_arxiv
    mode: scheduled
    summary: Recent arXiv papers are queried, scored against our interests, enriched
      locally, and the top results enter Inbox.
    schedule: hourly
    source_refs:
    - configs/domain_surfaces.yaml#paper.intake.parameters
    - growth_os/config/sources.yaml#interest_profile
    - growth_os/config/sources.yaml#scoring
    parameters:
      enabled: true
      top_n: 12
      lookback_days: 3
      analysis_batch_size: 25
      categories:
      - cs.LG
      - stat.ML
      - cs.CV
      - cs.CL
      - cs.AI
      - stat.ME
      - stat.AP
      review_topics:
      - Bayesian forecasting
      - Sports analytics
      - Player tracking computer vision
      - LLM agents
      - MLOps and feature stores
    editable: true
  empty_state:
    title: No papers in the queue
    hint: The research-digest intake feeds the papers board; sync lands here.
    command: uv run cc research-digest feed
